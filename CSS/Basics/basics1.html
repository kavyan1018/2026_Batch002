<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- External CSS -->
    <link rel="stylesheet" href="./Basics.css">
    <title>Document</title>
</head>
<style>

    /* Internal CSS */

    div{
        color: red;
        font-size: 20px;
    }

    /* use id selector : # */
    #another{
        color : green;
        font-size: 50px;
    
        
    }

    /* class selector : . */
    .ano{
        color: brown;
        font-size: 30px;
    }
</style>

<body>

    <!-- div and span -->

    <!-- inline css -->
    <h1 style="color: blue; font-size: 50px;">Royal Technosoft</h1>


    <div id="another" class="ano">
        this is a div element
    </div>

    <div>
        this is a another div element
    </div>

    <span class="span-class">This is a Span tag</span>
    <span>This is another Span tag</span>

</body>

</html>
