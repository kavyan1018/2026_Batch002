    /* after & before  -> pseudo elements*/
    
    h1{
        background-color: white;
        width: 200px;
        text-align: center;
    }
    h1::before{
        content: "I";
        background-color: orange;
        display: block;
    }


    h1::after{
        content: "Inida";
        display: block;
        background-color: green;
    }

</style>

<body>

    <!-- <h1 id="i">I</h1> -->
    <h1 id="love">Love</h1>
    <!-- <h1 id="india">Inida</h1> -->
