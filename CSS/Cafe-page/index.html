<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roast & Co.</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <header class="navbar">

            <div class="logo">Roast & Co.</div>

            <nav>
                <ul>
                    <li>Menu</li>
                    <li>Our Story</li>
                    <li>Locations</li>
                    <li>Shop</li>
                </ul>
            </nav>

        <button class="order-btn">Order Online</button>

    </header>


    <section class="hero">

        <div class="hero-text">
            <p class="subtitle">Specialty coffee Roasters</p>

            <h1>
                Crafted with <br>
                <span>Passion & precision</span>
            </h1>

            <p class="desc">
                From bean to cup, we obsess over every detail.
                Experience specialty coffee the way it was meant to be. 
            </p>

            <div class="buttons">
                <button class="our-menu">Our Menu</button>
                <button class="order-btn">Order Online</button>
            </div>
        </div>

        <div class="hero-image">
            <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93?fm=jpg&q=60&w=3000&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8Y29mZmVlc3xlbnwwfHwwfHx8MA%3D%3D" alt="Coffee cup image">
        </div>

    </section>

</body>
</html>
