<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="sty1.css">
    <title>Document</title>

</head>
<style>

    /* Internal CSS */
    span{
        color: blue;
    }

    /* for id access in the css we use (#) */
    #div2{
        color: green;
    }

    /* for class access in the css we use (.) */
    .span-class{
        color: orange;
    }

</style>
<body>

    <!-- inline element css -->
    <div style="color: red;" class="span-class">
        block level element
    </div>

    <div id="div2" class="span-class">
        This is a Div tag
    </div>


    <span>
        inline level element
    </span>
    <span class="span-class">
        This is a Span tag
    </span>

</body>

</html>
